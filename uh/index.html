<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Ujian Online</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 400px;
    }
    .login-card h2 {
      text-align: center;
      color: #1e293b;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #475569;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #2563eb;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-login:hover {
      background-color: #1d4ed8;
    }
    #alertBox {
      display: none;
      padding: 10px;
      background-color: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>Login Ujian</h2>
    
    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username / NISN</label>
        <input type="text" id="username" required placeholder="Masukkan username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Masukkan password">
      </div>

      <div class="form-group">
        <label for="jenisUjian">Pilih Paket Ujian</label>
        <select id="jenisUjian" required>
          <option value="./data/soal-uh1.json">Ulangan Harian 1</option>
        </select>
      </div>

      <button type="submit" class="btn-login">Masuk Ujian</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
