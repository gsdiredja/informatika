<div class="login-card">
  <h2>LOGIN AKSES UJIAN HARIAN</h2>
  <p class="subtitle">Masukkan username, password, dan pilih jenis ujian Anda.</p>
  <hr />

  <form id="loginForm">
    <!-- Dropdown Pilih Ulangan Harian -->
    <div class="form-group">
      <label for="jenisUjian">Pilih Ulangan Harian</label>
      <select id="jenisUjian" name="jenisUjian" required>
        <option value="data/soal-uh1.json">UH1 - Strategi Algoritmik & Pemrograman C++</option>
        <!-- Tambahkan pilihan UH lain jika ada -->
      </select>
    </div>

    <!-- Input Username -->
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" required />
    </div>

    <!-- Input Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="•••••" required />
    </div>

    <!-- Pesan Status / Error -->
    <div id="statusMessage" class="status-message text-success">
      Sistem siap. Silakan login.
    </div>

    <!-- Tombol Submit -->
    <button type="submit" id="btnSubmit" class="btn-primary">Masuk Ke Ujian</button>
  </form>
</div>
