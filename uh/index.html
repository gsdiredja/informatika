<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Akses Ujian Harian</title>
  <!-- Hubungkan CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Font Google Inter (Opsional agar tampilan lebih rapi) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <h2 class="title">LOGIN AKSES UJIAN HARIAN</h2>
      <p class="subtitle">Masukkan username, password, dan pilih jenis ujian Anda.</p>
      
      <hr class="divider" />

      <form id="loginForm">
        <!-- Pilihan Ulangan Harian (Dinamis membaca file di folder data/) -->
        <div class="form-group">
          <label for="jenisUjian">Pilih Ulangan Harian</label>
          <select id="jenisUjian" name="jenisUjian" required>
            <option value="data/soal-uh1.json">UH1 - Strategi Algoritmik & Pemrograman C++</option>
            <option value="data/soal-uh2.json">UH2 - Belum Tersedia</option>
            <option value="data/soal-uh3.json">UH3 - Belum Tersedia</option>
          </select>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Masukkan NISN / Username" required autocomplete="off" />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>

        <!-- Status Pesan -->
        <div id="statusMessage" class="status-message text-success">
          Sistem siap. Silakan login.
        </div>

        <!-- Tombol Submit -->
        <button type="submit" id="btnSubmit" class="btn-primary">Masuk Ke Ujian</button>
      </form>
    </div>
  </div>

  <!-- Hubungkan JavaScript Login -->
  <script src="app.js"></script>
</body>
</html>
