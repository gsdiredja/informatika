<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Ujian Harian</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: #ffffff;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      border: 1px solid #e2e8f0;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* Icon Buku Atas */
    .icon-box {
      width: 48px;
      height: 48px;
      background-color: #eef2ff;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 16px auto;
    }

    .icon-box svg {
      width: 24px;
      height: 24px;
      stroke: #4f46e5;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 24px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #334155;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      color: #1e293b;
      transition: all 0.2s ease;
      background-color: #ffffff;
    }

    .form-control:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    /* Style khusus untuk input username/password agar memiliki shade background lembut seperti di gambar */
    input.form-control {
      background-color: #edf2fe;
      border-color: #cbd5e1;
    }

    select.form-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2064748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
      padding-right: 36px;
      cursor: pointer;
    }

    /* Status Bar Info / Alert */
    .status-box {
      background-color: #f1f5f9;
      color: #64748b;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.825rem;
      margin-top: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .btn-submit:hover {
      background-color: #4338ca;
    }

    .btn-submit:disabled {
      background-color: #a5b4fc;
      cursor: not-allowed;
    }

    .footer-text {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <!-- Icon Buku -->
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
    </div>

    <h1 class="title">PORTAL UJIAN HARIAN</h1>
    <p class="subtitle">Silakan masuk menggunakan kredensial akun Anda</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="jenisUjian">Pilih Paket Ujian</label>
        <select id="jenisUjian" class="form-control" required>
          <option value="./data/soal-uh1.json">UH1 - Strategi Algoritmik & Pemrograman C++</option>
          <!-- Tambahkan paket ujian lain di sini jika ada -->
        </select>
      </div>

      <div class="form-group">
        <label for="username">Username / NISN</label>
        <input type="text" id="username" class="form-control" placeholder="admin" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>

      <!-- Notifikasi Status -->
      <div id="alertBox" class="status-box">
        Sistem siap. Silakan lengkapi form untuk masuk.
      </div>

      <button type="submit" class="btn-submit">Masuk Ke Ujian</button>
    </form>

    <div class="footer-text">
      © 2026 Portal Ujian Online<br>
      All rights reserved.<br>
      Design By Agus Tjakra
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
