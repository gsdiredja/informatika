<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lembar Ujian Harian</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }
    .exam-card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .header-user {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }
    /* Style Kotak Waktu / Timer */
    .timer-box {
      background-color: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-logout {
      background-color: #dc2626;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-nav {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-prev {
      background-color: #cbd5e1;
      color: #334155;
    }
    .btn-prev:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-next {
      background-color: #4f46e5;
      color: white;
    }
    .btn-submit {
      background-color: #16a34a;
      color: white;
    }
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      gap: 10px;
      flex-wrap: wrap;
    }
    #questionProgress {
      font-weight: 700;
      color: #475569;
      font-size: 1.1rem;
      min-width: 60px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="exam-card">
    <div>
      <div class="header-user">
        <div id="userInfo">
          <!-- Info Siswa Dirender via JS -->
        </div>

        <div style="display: flex; align-items: center; gap: 10px;">
          <!-- Timer Hitung Mundur -->
          <div id="timerContainer" class="timer-box">
            ⏱️ <span id="timerDisplay">60:00</span>
          </div>
          <button class="btn-logout" onclick="logout()">Keluar</button>
        </div>
      </div>

      <div id="questionsContainer">
        <p style="color: #64748b;">Memuat soal ujian...</p>
      </div>
    </div>

    <div class="nav-bar">
      <button id="btnPrev" class="btn-nav btn-prev" onclick="prevQuestion()">Sebelumnya</button>

      <div id="questionProgress">1/45</div>

      <div style="display: flex; gap: 10px;">
        <button id="btnNext" class="btn-nav btn-next" onclick="nextQuestion()">Selanjutnya</button>
        <button id="btnSubmitExam" class="btn-nav btn-submit" onclick="submitExam()" style="display: none;">Kirim Jawaban</button>
      </div>
    </div>
  </div>

  <script src="ujian.js"></script>
</body>
</html>
