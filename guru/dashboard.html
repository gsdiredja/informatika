<script>
    let sessionUser = null;

    document.addEventListener("DOMContentLoaded", () => {
        const savedSession = localStorage.getItem('user_session');
        if (!savedSession) {
            window.location.replace("index.html"); // atau login.html
            return;
        }

        sessionUser = JSON.parse(savedSession);
        console.log("Data Session Aktif:", sessionUser); // Untuk memantau di Inspect Element Console

        // 1. Tampilkan Profil Guru (Cegah undefined)
        document.getElementById('txtNamaGuru').innerText = sessionUser.nama || sessionUser.nama_lengkap || "Guru";
        document.getElementById('txtNipGuru').innerText = "NIP/Username: " + (sessionUser.username || sessionUser.nip || "-");
        
        if (sessionUser.foto) {
            document.getElementById('imgFotoGuru').src = sessionUser.foto;
        }

        // 2. Render Pilihan Mapel
        renderDropdownMapel();
    });

    function renderDropdownMapel() {
        const selectMapel = document.getElementById('selectMapel');
        selectMapel.innerHTML = '<option value="">-- Pilih Mapel --</option>';

        // A. Jika data berbentuk Array Penugasan (Multi-Mapel)
        if (sessionUser.penugasan && Array.isArray(sessionUser.penugasan) && sessionUser.penugasan.length > 0) {
            sessionUser.penugasan.forEach((p, index) => {
                selectMapel.innerHTML += `<option value="${index}">${p.mapel} [Role: ${(p.role || '').toUpperCase()}]</option>`;
            });
        } 
        // B. Jika data dari backend berupa format tunggal (mapel & ampu_kelas langsung di root user)
        else if (sessionUser.mapel) {
            selectMapel.innerHTML += `<option value="single">${sessionUser.mapel} [Role: ${(sessionUser.role || 'GURU').toUpperCase()}]</option>`;
        } else {
            selectMapel.innerHTML = '<option value="">-- Tidak ada mapel terdaftar --</option>';
        }
    }

    function updateDropdownKelas() {
        const selectMapelVal = document.getElementById('selectMapel').value;
        const selectKelas = document.getElementById('selectKelas');

        selectKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';

        if (selectMapelVal === "") {
            selectKelas.innerHTML = '<option value="">-- Pilih Mapel Terlebih Dahulu --</option>';
            return;
        }

        let stringKelas = "";

        // A. Ambil dari Array Penugasan
        if (selectMapelVal !== "single" && sessionUser.penugasan && sessionUser.penugasan[selectMapelVal]) {
            stringKelas = sessionUser.penugasan[selectMapelVal].ampu_kelas || "";
        } 
        // B. Ambil dari Format Tunggal
        else if (selectMapelVal === "single") {
            stringKelas = sessionUser.ampu_kelas || "";
        }

        if (stringKelas) {
            // Pisahkan berdasarkan koma (,)
            const arrayKelas = stringKelas.split(',');
            arrayKelas.forEach(kelas => {
                const kelasBersih = kelas.trim();
                if (kelasBersih) {
                    selectKelas.innerHTML += `<option value="${kelasBersih}">Kelas ${kelasBersih}</option>`;
                }
            });
        } else {
            selectKelas.innerHTML = '<option value="">-- Tidak ada kelas diampu --</option>';
        }
    }

    function logout() {
        localStorage.removeItem('user_session');
        window.location.replace("index.html");
    }
</script>
