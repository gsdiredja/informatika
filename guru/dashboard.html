<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAdaptif - Dashboard Guru</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-dark: #1e293b; --nav-blue: #2c3e50; --accent-blue: #3498db; --bg-light: #f1f5f9; --white: #ffffff; --secondary-dark: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; flex-direction: column; min-height: 100vh; color: #334155; }
        .main-wrapper { display: flex; flex: 1; flex-direction: column; }
        .top-header { background-color: var(--primary-dark); color: var(--white); text-align: center; padding: 15px 10px; z-index: 100; }
        .profile-pic { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); margin: 0 auto 5px; display: block; }
        .top-header h1 { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-bar { background-color: var(--nav-blue); display: flex; flex-wrap: wrap; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-bar a { flex: 1; text-align: center; color: #cbd5e1; padding: 12px 5px; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-bar a.active { border-bottom: 3px solid var(--accent-blue); background-color: rgba(255,255,255,0.05); color: #fff; }
        .btn-logout-top { width: 100%; background-color: #c0392b; text-align: center; color: var(--white); padding: 10px; text-decoration: none; font-size: 13px; font-weight: 600; display: block; border: none; cursor: pointer; }
        .content-area { flex: 1; padding: 15px; width: 100%; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Filter & Subtabs */
        .sub-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .btn-tab { padding: 8px 18px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-tab.active { background-color: var(--accent-blue); color: var(--white); }
        .btn-tab.inactive { background-color: #e2e8f0; color: #64748b; }
        .filter-card { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .form-grid { display: flex; flex-direction: column; gap: 12px; }
        select, input[type="date"], input[type="number"], input[type="text"], input[type="month"], textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        
        /* Tables */
        .table-responsive { width: 100%; overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; background: var(--white); }
        table { width: 100%; border-collapse: collapse; }
        table th { background-color: #f8fafc; color: #64748b; font-weight: 700; text-align: left; padding: 12px; font-size: 13px; border-bottom: 2px solid #e2e8f0; }
        table td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        .txt-center { text-align: center; } .txt-bold { font-weight: bold; }
        
        /* Buttons */
        .btn-edit { background: #f39c12; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-edit:hover { background: #d35400; }

        /* Presensi Radio Pill */
        .radio-group-horizontal { display: flex; justify-content: center; gap: 10px; align-items: center; }
        .radio-pill { display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #cbd5e1; background: #fff; cursor: pointer; font-weight: 700; font-size: 13px; transition: all 0.2s ease; user-select: none; }
        .radio-pill input[type="radio"] { display: none; }
        .radio-pill:has(input[value="H"]:checked) { background-color: #10b981; color: #fff; border-color: #10b981; }
        .radio-pill:has(input[value="S"]:checked) { background-color: #f59e0b; color: #fff; border-color: #f59e0b; }
        .radio-pill:has(input[value="I"]:checked) { background-color: #3b82f6; color: #fff; border-color: #3b82f6; }
        .radio-pill:has(input[value="A"]:checked) { background-color: #ef4444; color: #fff; border-color: #ef4444; }

        /* Area Tanda Tangan */
        .signature-container { display: none; justify-content: space-between; width: 100%; margin-top: 40px; padding: 10px; background: var(--white); }
        .sig-box { text-align: center; width: 240px; font-size: 14px; }
        .sig-space { height: 70px; }

        /* Modal Box Edit */
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: #fff; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        footer { background-color: var(--secondary-dark); color: #94a3b8; text-align: center; padding: 20px; font-size: 12px; margin-top: auto; }

        @media (min-width: 769px) {
            .main-wrapper { flex-direction: row; }
            .top-header { width: 260px; min-height: 100vh; position: sticky; top: 0; padding-top: 40px; }
            .profile-pic { width: 90px; height: 90px; margin-bottom: 15px; }
            .nav-bar { flex-direction: column; background: none; box-shadow: none; margin-top: 25px; }
            .nav-bar a { width: 100%; text-align: left; padding: 15px 25px; flex-direction: row; gap: 12px; font-size: 15px; }
            .nav-bar a.active { border-left: 4px solid var(--accent-blue); background-color: #34495e; border-bottom: none; }
            .btn-logout-top { position: absolute; bottom: 0; left: 0; padding: 15px; }
            .content-area { padding: 30px; max-width: calc(100% - 260px); }
            .form-grid { flex-direction: row; }
        }

        @media print {
            .top-header, .filter-card, .sub-tabs, .btn-logout-top, .no-print, footer, .btn-print-action, .form-jurnal-box, .col-aksi { display: none !important; }
            body, .main-wrapper, .content-area, .card { background: white !important; margin: 0 !important; padding: 0 !important; width: 100% !important; display: block !important; box-shadow: none !important; }
            table { border: 1px solid #000 !important; width: 100% !important; }
            table th, table td { border: 1px solid #000 !important; padding: 6px !important; color: #000 !important; font-size: 12px !important; }
            .signature-container { display: flex !important; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-header">
        <img id="user-pic" src="photo-guru.png" class="profile-pic" alt="User">
        <h1>EduAdaptif</h1>
        <p id="user-name" style="font-size:12px; color:#cbd5e1; font-weight:600; margin-top:5px;">Loading...</p>
        <br/>
        <div class="nav-bar">
            <a onclick="loadPage('beranda')" id="nav-beranda" class="active"><i class="fas fa-tachometer-alt"></i> Beranda</a>
            <a onclick="loadPage('presensi')" id="nav-presensi"><i class="fas fa-clipboard-user"></i> Presensi Siswa</a>
            <a onclick="loadPage('jurnal')" id="nav-jurnal"><i class="fas fa-book-open"></i> Jurnal Mengajar</a>
            <a onclick="loadPage('nilai')" id="nav-nilai"><i class="fas fa-graduation-cap"></i> Input Nilai</a>
            <a onclick="loadPage('rekap')" id="nav-rekap"><i class="fas fa-file-invoice"></i> Rekapitulasi</a>
        </div>
        <button onclick="logout()" class="btn-logout-top"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    </div>

    <div class="content-area">
        <div class="card" id="main-content">
            <!-- Konten Dinamis Dimuat di Sini -->
        </div>
    </div>
</div>

<!-- MODAL EDIT JURNAL -->
<div id="modal-edit-jurnal" class="modal-bg">
    <div class="modal-body">
        <h3 style="margin-bottom:15px; font-size:16px;"><i class="fas fa-edit"></i> Edit Jurnal Mengajar</h3>
        <input type="hidden" id="edit-jurnal-index">
        <div style="margin-bottom:12px;">
            <label style="font-weight:600; display:block; margin-bottom:5px;">Tanggal:</label>
            <input type="date" id="edit-jurnal-tgl" readonly style="background:#eee;">
        </div>
        <div style="margin-bottom:12px;">
            <label style="font-weight:600; display:block; margin-bottom:5px;">Kelas:</label>
            <input type="text" id="edit-jurnal-kelas" readonly style="background:#eee;">
        </div>
        <div style="margin-bottom:12px;">
            <label style="font-weight:600; display:block; margin-bottom:5px;">Materi / Pembahasan:</label>
            <textarea id="edit-jurnal-materi" rows="3"></textarea>
        </div>
        <div style="margin-bottom:20px;">
            <label style="font-weight:600; display:block; margin-bottom:5px;">Tugas / Catatan:</label>
            <input type="text" id="edit-jurnal-tugas">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button onclick="closeModalJurnal()" style="padding:10px 15px; border:none; background:#cbd5e1; border-radius:6px; cursor:pointer; font-weight:bold;">Batal</button>
            <button onclick="submitUpdateJurnal()" style="padding:10px 15px; border:none; background:#2ecc71; color:#fff; border-radius:6px; cursor:pointer; font-weight:bold;">Simpan Perubahan</button>
        </div>
    </div>
</div>

<footer>&copy; 2026 <strong>EduAdaptif</strong> | Created by usudo.id</footer>

<script src="config.js"></script>
<script>
    const userSession = JSON.parse(localStorage.getItem('user_session'));
    if (!userSession) window.location.href = 'index.html';

    document.getElementById('user-name').innerText = userSession.nama;
    if (userSession.foto) document.getElementById('user-pic').src = userSession.foto;

    const myKelas = userSession.ampu_kelas.split(',');
    let currentRekapSub = 'presensi';

    function logout() {
        localStorage.removeItem('user_session');
        window.location.href = 'index.html';
    }

    function setActiveNav(page) {
        document.querySelectorAll('.nav-bar a').forEach(a => a.classList.remove('active'));
        const activeLink = document.getElementById('nav-' + page);
        if (activeLink) activeLink.classList.add('active');
    }

    async function loadPage(page) {
        setActiveNav(page);
        const container = document.getElementById('main-content');

        if (page === 'beranda') {
            container.innerHTML = `
                <div style="text-align: center; padding: 50px 20px;">
                    <h2>RUANG KERJA DIGITAL</h2>
                    <p style="color: #64748b; margin-top:10px;">Selamat datang <strong>${userSession.nama}</strong>. Portal siap mengelola presensi, jurnal, nilai, dan rekapitulasi siswa.</p>
                </div>`;
        } 
        else if (page === 'presensi') {
            container.innerHTML = `
                <h2>Input Presensi Harian — <span style="color:var(--accent-blue);">${userSession.mapel}</span></h2>
                <div class="filter-card">
                    <div class="form-grid">
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="sel-kelas-presensi" onchange="renderPresensi()">
                                ${myKelas.map(k => `<option value="${k}">Kelas ${k}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Tanggal Mengajar:</label>
                            <input type="date" id="sel-tgl-presensi" value="${new Date().toISOString().split('T')[0]}" onchange="renderPresensi()">
                        </div>
                    </div>
                </div>
                <div id="presensi-table-container">Memuat data siswa...</div>`;
            renderPresensi();
        }
        else if (page === 'jurnal') {
            container.innerHTML = `
                <h2>Jurnal Mengajar Guru — <span style="color:var(--accent-blue);">${userSession.mapel}</span></h2>
                <div class="filter-card form-jurnal-box">
                    <h3 style="margin-bottom: 12px; font-size: 16px; color: #1e293b;"><i class="fas fa-edit"></i> Isi Jurnal KBM</h3>
                    <div class="form-grid" style="margin-bottom:12px;">
                        <div style="flex:1;">
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Tanggal:</label>
                            <input type="date" id="jurnal-tgl" value="${new Date().toISOString().split('T')[0]}">
                        </div>
                        <div style="flex:1;">
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="jurnal-kelas">
                                ${myKelas.map(k => `<option value="${k}">Kelas ${k}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div style="margin-bottom:12px;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Materi / Pembahasan:</label>
                        <textarea id="jurnal-materi" rows="3" placeholder="Tuliskan uraian materi KBM hari ini..."></textarea>
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Tugas / Catatan Tambahan:</label>
                        <input type="text" id="jurnal-tugas" placeholder="Tugas siswa atau catatan khusus KBM...">
                    </div>
                    <button id="btn-save-jurnal" onclick="saveJurnal()" style="background:var(--accent-blue); color:#fff; border:none; padding:12px; border-radius:6px; width:100%; font-weight:bold; cursor:pointer;">
                        <i class="fas fa-paper-plane"></i> Posting Jurnal KBM
                    </button>
                </div>
                
                <h3 style="margin:25px 0 15px; font-size:16px;"><i class="fas fa-history"></i> Riwayat Jurnal Mengajar</h3>
                <div id="jurnal-table-container">Memuat riwayat jurnal...</div>`;
            renderJurnal();
        }
        else if (page === 'nilai') {
            const labels = {
                'nh1': 'Nilai Harian 1 (NH1)', 'nh2': 'Nilai Harian 2 (NH2)',
                'tugas1': 'Tugas 1', 'sts1': 'Sumatif Tengah Semester 1', 'sas1': 'Sumatif Akhir Semester 1'
            };
            container.innerHTML = `
                <h2>Daftar Penginputan Nilai — <span style="color:#2ecc71;">${userSession.mapel}</span></h2>
                <div class="filter-card">
                    <div class="form-grid">
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="sel-kelas-nilai" onchange="renderNilai()">
                                ${myKelas.map(k => `<option value="${k}">Kelas ${k}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Kategori Penilaian:</label>
                            <select id="sel-jenis-nilai" onchange="renderNilai()">
                                ${Object.keys(labels).map(k => `<option value="${k}">${labels[k]}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                </div>
                <div id="nilai-table-container">Memuat data nilai...</div>`;
            renderNilai();
        }
        else if (page === 'rekap') {
            container.innerHTML = `
                <h2>Rekapitulasi & Laporan — <span style="color:var(--accent-blue);">${userSession.mapel}</span></h2>
                <div class="sub-tabs no-print">
                    <button class="btn-tab ${currentRekapSub === 'presensi' ? 'active' : 'inactive'}" onclick="switchRekap('presensi')">Rekap Presensi</button>
                    <button class="btn-tab ${currentRekapSub === 'jurnal' ? 'active' : 'inactive'}" onclick="switchRekap('jurnal')">Rekap Jurnal</button>
                    <button class="btn-tab ${currentRekapSub === 'nilai' ? 'active' : 'inactive'}" onclick="switchRekap('nilai')">Rekap Nilai (Leger)</button>
                </div>
                <div id="rekap-content-area">Memuat rekapitulasi...</div>`;
            renderRekap();
        }
    }

    function switchRekap(sub) {
        currentRekapSub = sub;
        loadPage('rekap');
    }

    /* PRESENSI HANDLER */
    async function renderPresensi() {
        const kls = document.getElementById('sel-kelas-presensi').value;
        const tgl = document.getElementById('sel-tgl-presensi').value;
        const container = document.getElementById('presensi-table-container');

        try {
            const [resSiswa, resPres] = await Promise.all([
                fetch(`${API_URL}?action=getSiswa`).then(r => r.json()),
                fetch(`${API_URL}?action=getPresensi&tanggal=${tgl}&kelas=${kls}&mapel=${userSession.mapel}`).then(r => r.json())
            ]);

            const siswaList = resSiswa.data ? resSiswa.data.filter(s => s.kelas === kls) : [];
            const presData = resPres.data || {};

            if (siswaList.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8;">Tidak ada data siswa ditemukan untuk kelas ini.</div>`;
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th width="50" class="txt-center">No</th>
                                <th>Nama Lengkap Siswa</th>
                                <th width="320" class="txt-center">Status Kehadiran</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            siswaList.forEach((s, idx) => {
                const status = presData[s.nama] || 'H'; 
                html += `
                    <tr>
                        <td class="txt-center">${idx + 1}</td>
                        <td class="txt-bold" style="color:#1e293b;">${s.nama}</td>
                        <td class="txt-center">
                            <div class="radio-group-horizontal">
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="H" ${status==='H'?'checked':''} data-nama="${s.nama}"> Hadir</label>
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="S" ${status==='S'?'checked':''} data-nama="${s.nama}"> Sakit</label>
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="I" ${status==='I'?'checked':''} data-nama="${s.nama}"> Izin</label>
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="A" ${status==='A'?'checked':''} data-nama="${s.nama}"> Alpha</label>
                            </div>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table></div>
            <button id="btn-save-presensi" onclick="savePresensi()" style="background:var(--accent-blue); color:#fff; border:none; padding:13px; border-radius:8px; width:100%; margin-top:20px; font-weight:bold; cursor:pointer;">
                <i class="fas fa-save" style="margin-right:8px;"></i> Simpan Data Presensi
            </button>`;
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = `<div style="color:#ef4444; padding:20px; text-align:center;">Gagal memuat data dari database Google Sheets.</div>`;
        }
    }

    async function savePresensi() {
        const btn = document.getElementById('btn-save-presensi');
        const kls = document.getElementById('sel-kelas-presensi').value;
        const tgl = document.getElementById('sel-tgl-presensi').value;
        const inputs = document.querySelectorAll('#presensi-table-container input[type="radio"]:checked');
        
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Menyimpan...`;

        const listPresensi = [];
        inputs.forEach(inp => {
            listPresensi.push({ nama: inp.getAttribute('data-nama'), status: inp.value });
        });

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'savePresensi', tanggal: tgl, kelas: kls, mapel: userSession.mapel, presensi: listPresensi })
            });
            const data = await res.json();
            alert(data.message || 'Presensi berhasil disimpan!');
        } catch (e) {
            alert('Terjadi kesalahan saat menyimpan data presensi.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-save" style="margin-right:8px;"></i> Simpan Data Presensi`;
        }
    }

    /* JURNAL HANDLER */
    let cacheJurnalData = [];

    async function renderJurnal() {
        const container = document.getElementById('jurnal-table-container');
        try {
            const res = await fetch(`${API_URL}?action=getJurnal`).then(r => r.json());
            cacheJurnalData = res.data || [];

            if (cacheJurnalData.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:#94a3b8;">Belum ada riwayat jurnal mengajar tersimpan.</div>`;
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th width="40" class="txt-center">No</th>
                                <th width="110" class="txt-center">Tanggal</th>
                                <th width="90" class="txt-center">Kelas</th>
                                <th>Materi KBM</th>
                                <th>Tugas / Catatan</th>
                                <th width="70" class="txt-center col-aksi">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>`;

            cacheJurnalData.reverse().forEach((j, idx) => {
                html += `
                    <tr>
                        <td class="txt-center">${idx + 1}</td>
                        <td class="txt-center">${j.tanggal}</td>
                        <td class="txt-center txt-bold">Kelas ${j.kelas}</td>
                        <td>${j.materi || '-'}</td>
                        <td>${j.tugas || '-'}</td>
                        <td class="txt-center col-aksi">
                            <button onclick="openModalEditJurnal(${idx})" class="btn-edit"><i class="fas fa-edit"></i> Edit</button>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = `<div style="color:#ef4444; padding:20px; text-align:center;">Gagal memuat jurnal dari database.</div>`;
        }
    }

    function openModalEditJurnal(idx) {
        const item = cacheJurnalData[idx];
        document.getElementById('edit-jurnal-index').value = idx;
        document.getElementById('edit-jurnal-tgl').value = item.tanggal;
        document.getElementById('edit-jurnal-kelas').value = item.kelas;
        document.getElementById('edit-jurnal-materi').value = item.materi;
        document.getElementById('edit-jurnal-tugas').value = item.tugas;
        document.getElementById('modal-edit-jurnal').style.display = 'flex';
    }

    function closeModalJurnal() {
        document.getElementById('modal-edit-jurnal').style.display = 'none';
    }

    async function submitUpdateJurnal() {
        const tgl = document.getElementById('edit-jurnal-tgl').value;
        const kls = document.getElementById('edit-jurnal-kelas').value;
        const materi = document.getElementById('edit-jurnal-materi').value;
        const tugas = document.getElementById('edit-jurnal-tugas').value;

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'saveJurnal',
                    tanggal: tgl,
                    kelas: kls,
                    mapel: userSession.mapel,
                    materi: materi,
                    tugas: tugas
                })
            });
            const data = await res.json();
            alert(data.message || 'Jurnal berhasil diperbarui!');
            closeModalJurnal();
            renderJurnal();
        } catch (e) {
            alert('Gagal memperbarui jurnal.');
        }
    }

    async function saveJurnal() {
        const btn = document.getElementById('btn-save-jurnal');
        const tgl = document.getElementById('jurnal-tgl').value;
        const kls = document.getElementById('jurnal-kelas').value;
        const materi = document.getElementById('jurnal-materi').value.trim();
        const tugas = document.getElementById('jurnal-tugas').value.trim();

        if (!materi) {
            alert('Materi KBM wajib diisi!');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Memposting...`;

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'saveJurnal',
                    tanggal: tgl,
                    kelas: kls,
                    mapel: userSession.mapel,
                    materi: materi,
                    tugas: tugas
                })
            });
            const data = await res.json();
            alert(data.message || 'Jurnal berhasil diposting!');
            document.getElementById('jurnal-materi').value = '';
            document.getElementById('jurnal-tugas').value = '';
            renderJurnal();
        } catch (e) {
            alert('Terjadi kesalahan saat menyimpan jurnal.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-paper-plane"></i> Posting Jurnal KBM`;
        }
    }

    /* NILAI HANDLER */
    async function renderNilai() {
        const kls = document.getElementById('sel-kelas-nilai').value;
        const jenis = document.getElementById('sel-jenis-nilai').value;
        const container = document.getElementById('nilai-table-container');

        try {
            const [resSiswa, resNilai] = await Promise.all([
                fetch(`${API_URL}?action=getSiswa`).then(r => r.json()),
                fetch(`${API_URL}?action=getNilai&kelas=${kls}&jenis=${jenis}&mapel=${userSession.mapel}`).then(r => r.json())
            ]);

            const siswaList = resSiswa.data ? resSiswa.data.filter(s => s.kelas === kls) : [];
            const nilaiData = resNilai.data || {};

            if (siswaList.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8;">Tidak ada data siswa ditemukan untuk kelas ini.</div>`;
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table>
                        <thead><tr><th width="50" class="txt-center">No</th><th>Nama Lengkap Siswa</th><th width="180" class="txt-center">Skor Capaian (0 - 100)</th></tr></thead>
                        <tbody>`;
            
            siswaList.forEach((s, idx) => {
                const skor = nilaiData[s.nama] !== undefined ? nilaiData[s.nama] : 0;
                html += `
                    <tr>
                        <td class="txt-center">${idx + 1}</td>
                        <td class="txt-bold" style="color:#1e293b;">${s.nama}</td>
                        <td><input type="number" class="skor-input" data-nama="${s.nama}" min="0" max="100" value="${skor}" style="text-align:center; font-weight:bold;"></td>
                    </tr>`;
            });

            html += `</tbody></table></div>
            <button id="btn-save-nilai" onclick="saveNilai()" style="background:#27ae60; color:#fff; border:none; padding:13px; border-radius:8px; width:100%; margin-top:20px; font-weight:bold; cursor:pointer;">
                <i class="fas fa-check-circle" style="margin-right:8px;"></i> Simpan & Kunci Nilai
            </button>`;
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<div style="color:#ef4444; padding:20px; text-align:center;">Gagal memuat data nilai.</div>`;
        }
    }

    async function saveNilai() {
        const btn = document.getElementById('btn-save-nilai');
        const kls = document.getElementById('sel-kelas-nilai').value;
        const jenis = document.getElementById('sel-jenis-nilai').value;
        const inputs = document.querySelectorAll('.skor-input');
        
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Memproses...`;

        const scores = [];
        inputs.forEach(inp => {
            scores.push({ nama: inp.getAttribute('data-nama'), skor: parseInt(inp.value) || 0 });
        });

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'saveNilai', kelas: kls, jenis: jenis, mapel: userSession.mapel, scores: scores })
            });
            const data = await res.json();
            alert(data.message || 'Nilai berhasil disimpan!');
        } catch (e) {
            alert('Terjadi kesalahan saat menyimpan nilai.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-check-circle" style="margin-right:8px;"></i> Simpan & Kunci Nilai`;
        }
    }

    /* REKAP HANDLER */
    async function renderRekap() {
        const area = document.getElementById('rekap-content-area');

        if (currentRekapSub === 'presensi') {
            area.innerHTML = `
                <div class="filter-card no-print">
                    <div class="form-grid">
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="rekap-presensi-kelas" onchange="fetchRekapPresensi()">
                                ${myKelas.map(k => `<option value="${k}">Kelas ${k}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Tipe Rentang Rekap:</label>
                            <select id="rekap-presensi-tipe" onchange="toggleFilterRekapPresensi()">
                                <option value="bulanan">Bulanan</option>
                                <option value="mingguan">Mingguan</option>
                                <option value="harian">Harian</option>
                            </select>
                        </div>
                        <div id="box-filter-rekap-presensi" style="flex:1;">
                            <!-- Filter Dinamis Dimuat Di Sini -->
                        </div>
                    </div>
                </div>
                <div id="rekap-presensi-table">Memuat data rekap presensi...</div>`;
            toggleFilterRekapPresensi();
        } 
        else if (currentRekapSub === 'jurnal') {
            area.innerHTML = `
                <div class="filter-card no-print">
                    <div class="form-grid">
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="rekap-jurnal-kelas" onchange="fetchRekapJurnal()">
                                ${myKelas.map(k => `<option value="${k}">Kelas ${k}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                </div>
                <div id="rekap-jurnal-table">Memuat data rekap jurnal...</div>`;
            fetchRekapJurnal();
        }
        else if (currentRekapSub === 'nilai') {
            area.innerHTML = `
                <div class="filter-card no-print">
                    <div class="form-grid">
                        <div>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="rekap-nilai-kelas" onchange="fetchRekapNilai()">
                                ${myKelas.map(k => `<option value="${k}">Kelas ${k}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                </div>
                <div id="rekap-nilai-table">Memuat data rekap nilai...</div>`;
            fetchRekapNilai();
        }
    }

    function toggleFilterRekapPresensi() {
        const tipe = document.getElementById('rekap-presensi-tipe').value;
        const box = document.getElementById('box-filter-rekap-presensi');
        const now = new Date().toISOString().split('T')[0];
        
        if (tipe === 'harian') {
            box.innerHTML = `
                <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Tanggal:</label>
                <input type="date" id="rekap-presensi-val" value="${now}" onchange="fetchRekapPresensi()">`;
        } else if (tipe === 'mingguan') {
            box.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Awal Minggu:</label>
                        <input type="date" id="rekap-presensi-val1" value="${now}" onchange="fetchRekapPresensi()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Akhir Minggu:</label>
                        <input type="date" id="rekap-presensi-val2" value="${now}" onchange="fetchRekapPresensi()">
                    </div>
                </div>`;
        } else {
            box.innerHTML = `
                <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Bulan:</label>
                <input type="month" id="rekap-presensi-val" value="${now.slice(0,7)}" onchange="fetchRekapPresensi()">`;
        }
        fetchRekapPresensi();
    }

    async function fetchRekapPresensi() {
        const kls = document.getElementById('rekap-presensi-kelas').value;
        const container = document.getElementById('rekap-presensi-table');

        const [resSiswa, resPres] = await Promise.all([
            fetch(`${API_URL}?action=getSiswa`).then(r => r.json()),
            fetch(`${API_URL}?action=getPresensi&kelas=${kls}&mapel=${userSession.mapel}`).then(r => r.json())
        ]);

        const siswaList = resSiswa.data ? resSiswa.data.filter(s => s.kelas === kls) : [];
        const presData = resPres.data || {};

        let html = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" class="no-print">
                <h3>REKAP PRESENSI - KELAS ${kls}</h3>
                <button onclick="window.print()" style="background:#2c3e50; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fas fa-print"></i> Cetak PDF</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th width="40" class="txt-center">No</th>
                            <th>Nama Lengkap Siswa</th>
                            <th width="60" class="txt-center" style="color:#10b981;">H</th>
                            <th width="60" class="txt-center" style="color:#f59e0b;">S</th>
                            <th width="60" class="txt-center" style="color:#3b82f6;">I</th>
                            <th width="60" class="txt-center" style="color:#ef4444;">A</th>
                            <th width="80" class="txt-center col-aksi">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>`;

        siswaList.forEach((s, idx) => {
            const p = presData[s.nama] || { H: 0, S: 0, I: 0, A: 0 };
            const h = typeof p === 'object' ? (p.H || 0) : (p === 'H' ? 1 : 0);
            const sak = typeof p === 'object' ? (p.S || 0) : (p === 'S' ? 1 : 0);
            const iz = typeof p === 'object' ? (p.I || 0) : (p === 'I' ? 1 : 0);
            const alp = typeof p === 'object' ? (p.A || 0) : (p === 'A' ? 1 : 0);

            html += `
                <tr>
                    <td class="txt-center">${idx + 1}</td>
                    <td class="txt-bold">${s.nama}</td>
                    <td class="txt-center">${h}</td>
                    <td class="txt-center">${sak}</td>
                    <td class="txt-center">${iz}</td>
                    <td class="txt-center">${alp}</td>
                    <td class="txt-center col-aksi">
                        <button onclick="loadPage('presensi')" class="btn-edit"><i class="fas fa-edit"></i> Edit</button>
                    </td>
                </tr>`;
        });

        html += `</tbody></table></div>
        
        <div class="signature-container">
            <div class="sig-box">
                <p>Mengetahui,</p>
                <p><strong>Kepala Sekolah</strong></p>
                <div class="sig-space"></div>
                <p>_______________________</p>
            </div>
            <div class="sig-box">
                <p>Guru Mata Pelajaran,</p>
                <br>
                <div class="sig-space"></div>
                <p><strong>${userSession.nama}</strong></p>
            </div>
        </div>`;
        container.innerHTML = html;
    }

    async function fetchRekapJurnal() {
        const kls = document.getElementById('rekap-jurnal-kelas').value;
        const container = document.getElementById('rekap-jurnal-table');

        const res = await fetch(`${API_URL}?action=getJurnal`).then(r => r.json());
        const listJurnal = res.data ? res.data.filter(j => j.kelas === kls) : [];

        let html = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" class="no-print">
                <h3>REKAP JURNAL KBM - KELAS ${kls}</h3>
                <button onclick="window.print()" style="background:#2c3e50; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fas fa-print"></i> Cetak PDF Jurnal</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th width="40" class="txt-center">No</th>
                            <th width="110" class="txt-center">Tanggal</th>
                            <th>Materi Pembahasan</th>
                            <th>Tugas / Catatan</th>
                        </tr>
                    </thead>
                    <tbody>`;

        if (listJurnal.length === 0) {
            html += `<tr><td colspan="4" class="txt-center" style="color:#94a3b8; padding:20px;">Belum ada catatan jurnal mengajar untuk kelas ini.</td></tr>`;
        } else {
            listJurnal.forEach((j, idx) => {
                html += `
                    <tr>
                        <td class="txt-center">${idx + 1}</td>
                        <td class="txt-center">${j.tanggal}</td>
                        <td>${j.materi || '-'}</td>
                        <td>${j.tugas || '-'}</td>
                    </tr>`;
            });
        }

        html += `</tbody></table></div>
        
        <div class="signature-container">
            <div class="sig-box">
                <p>Mengetahui,</p>
                <p><strong>Kepala Sekolah</strong></p>
                <div class="sig-space"></div>
                <p>_______________________</p>
            </div>
            <div class="sig-box">
                <p>Guru Mata Pelajaran,</p>
                <br>
                <div class="sig-space"></div>
                <p><strong>${userSession.nama}</strong></p>
            </div>
        </div>`;
        container.innerHTML = html;
    }

    async function fetchRekapNilai() {
        const kls = document.getElementById('rekap-nilai-kelas').value;
        const container = document.getElementById('rekap-nilai-table');

        const resSiswa = await fetch(`${API_URL}?action=getSiswa`).then(r => r.json());
        const siswaList = resSiswa.data ? resSiswa.data.filter(s => s.kelas === kls) : [];

        let html = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" class="no-print">

                <button onclick="window.print()" style="background:#2c3e50; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fas fa-print"></i> Cetak Leger PDF</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th width="40" class="txt-center">No</th>
                            <th>Nama Lengkap Siswa</th>
                            <th width="70" class="txt-center">NH1</th>
                            <th width="70" class="txt-center">NH2</th>
                            <th width="70" class="txt-center">Tugas</th>
                            <th width="70" class="txt-center">STS</th>
                            <th width="70" class="txt-center">SAS</th>
                            <th width="90" class="txt-center" style="background:#e2e8f0;">Rata-Rata</th>
                            <th width="70" class="txt-center col-aksi">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>`;

        siswaList.forEach((s, idx) => {
            html += `
                <tr>
                    <td class="txt-center">${idx + 1}</td>
                    <td class="txt-bold">${s.nama}</td>
                    <td class="txt-center">0</td>
                    <td class="txt-center">0</td>
                    <td class="txt-center">0</td>
                    <td class="txt-center">0</td>
                    <td class="txt-center">0</td>
                    <td class="txt-center txt-bold" style="background:#f8fafc;">0.0</td>
                    <td class="txt-center col-aksi">
                        <button onclick="loadPage('nilai')" class="btn-edit"><i class="fas fa-edit"></i> Edit</button>
                    </td>
                </tr>`;
        });

        html += `</tbody></table></div>
        
        <div class="signature-container">
            <div class="sig-box">
                <p>Mengetahui,</p>
                <p><strong>Kepala Sekolah</strong></p>
                <div class="sig-space"></div>
                <p>_______________________</p>
            </div>
            <div class="sig-box">
                <p>Guru Mata Pelajaran,</p>
                <br>
                <div class="sig-space"></div>
                <p><strong>${userSession.nama}</strong></p>
            </div>
        </div>`;
        container.innerHTML = html;
    }

    // Default Load Page
    loadPage('beranda');
</script>
