<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAdaptif - Rekapitulasi & Laporan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-dark: #1e293b; --nav-blue: #2c3e50; --accent-blue: #3498db; --bg-light: #f1f5f9; --white: #ffffff; --secondary-dark: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; flex-direction: column; min-height: 100vh; color: #334155; }
        .main-wrapper { display: flex; flex: 1; flex-direction: column; }
        .top-header { background-color: var(--primary-dark); color: var(--white); text-align: center; padding: 15px 10px; z-index: 100; }
        .profile-pic { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); margin: 0 auto 5px; display: block; }
        .top-header h1 { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-bar { background-color: var(--nav-blue); display: flex; flex-wrap: wrap; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-bar a { flex: 1; text-align: center; color: #cbd5e1; padding: 12px 5px; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-bar a.active { border-bottom: 3px solid var(--accent-blue); background-color: rgba(255,255,255,0.05); color: #fff; }
        .btn-logout-top { width: 100%; background-color: #c0392b; text-align: center; color: var(--white); padding: 10px; text-decoration: none; font-size: 13px; font-weight: 600; display: block; border: none; cursor: pointer; }
        .content-area { flex: 1; padding: 15px; width: 100%; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .sub-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .btn-tab { padding: 8px 18px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-tab.active { background-color: var(--accent-blue); color: var(--white); }
        .btn-tab.inactive { background-color: #e2e8f0; color: #64748b; }
        
        .filter-card { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .form-grid { display: flex; flex-direction: column; gap: 12px; }
        select, input[type="date"], input[type="month"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        
        .table-responsive { width: 100%; overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; background: var(--white); }
        table { width: 100%; border-collapse: collapse; }
        table th { background-color: #f8fafc; color: #64748b; font-weight: 700; text-align: left; padding: 12px; font-size: 13px; border-bottom: 2px solid #e2e8f0; }
        table td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        .txt-center { text-align: center; } .txt-bold { font-weight: bold; }
        
        .signature-container { display: none; justify-content: space-between; width: 100%; margin-top: 40px; padding: 10px; background: var(--white); }
        .sig-box { text-align: center; width: 240px; font-size: 14px; }
        .sig-space { height: 70px; }

        footer { background-color: var(--secondary-dark); color: #94a3b8; text-align: center; padding: 20px; font-size: 12px; margin-top: auto; }

        @media (min-width: 769px) {
            .main-wrapper { flex-direction: row; }
            .top-header { width: 260px; min-height: 100vh; position: sticky; top: 0; padding-top: 40px; }
            .profile-pic { width: 90px; height: 90px; margin-bottom: 15px; }
            .nav-bar { flex-direction: column; background: none; box-shadow: none; margin-top: 25px; }
            .nav-bar a { width: 100%; text-align: left; padding: 15px 25px; flex-direction: row; gap: 12px; font-size: 15px; }
            .nav-bar a.active { border-left: 4px solid var(--accent-blue); background-color: #34495e; border-bottom: none; }
            .btn-logout-top { position: absolute; bottom: 0; left: 0; padding: 15px; }
            .content-area { padding: 30px; max-width: calc(100% - 260px); }
            .form-grid { flex-direction: row; }
        }

        @media print {
            .top-header, .filter-card, .sub-tabs, .btn-logout-top, .no-print, footer, .col-aksi { display: none !important; }
            body, .main-wrapper, .content-area, .card { background: white !important; margin: 0 !important; padding: 0 !important; width: 100% !important; display: block !important; box-shadow: none !important; }
            table { border: 1px solid #000 !important; width: 100% !important; }
            table th, table td { border: 1px solid #000 !important; padding: 6px !important; color: #000 !important; font-size: 12px !important; }
            .signature-container { display: flex !important; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-header">
        <img id="user-pic" src="photo-guru.png" class="profile-pic" alt="User">
        <h1>EduAdaptif</h1>
        <p id="user-name" style="font-size:12px; color:#cbd5e1; font-weight:600; margin-top:5px;">Loading...</p>
        <br/>
        <div class="nav-bar">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="presensi.html"><i class="fas fa-clipboard-user"></i> Presensi Siswa</a>
            <a href="jurnal.html"><i class="fas fa-book-open"></i> Jurnal Mengajar</a>
            <a href="nilai.html"><i class="fas fa-graduation-cap"></i> Input Nilai</a>
            <a href="rekap.html" class="active"><i class="fas fa-file-invoice"></i> Rekapitulasi</a>
        </div>
        <button onclick="logout()" class="btn-logout-top"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    </div>

    <div class="content-area">
        <div class="card">
            <h2>Rekapitulasi & Laporan — <span id="lbl-mapel" style="color:var(--accent-blue);"></span></h2>
            <br>
            <div class="sub-tabs no-print">
                <button id="tab-presensi" class="btn-tab active" onclick="switchTab('presensi')">Rekap Presensi</button>
                <button id="tab-jurnal" class="btn-tab inactive" onclick="switchTab('jurnal')">Rekap Jurnal</button>
                <button id="tab-nilai" class="btn-tab inactive" onclick="switchTab('nilai')">Rekap Nilai (Leger)</button>
            </div>

            <div id="rekap-content-area">Memuat rekapitulasi...</div>
        </div>
    </div>
</div>

<footer>&copy; 2026 <strong>EduAdaptif</strong> | Created by usudo.id</footer>

<script src="config.js"></script>
<script>
    const userSession = JSON.parse(localStorage.getItem('user_session'));
    if (!userSession) window.location.href = 'index.html';

    document.getElementById('user-name').innerText = userSession.nama;
    document.getElementById('lbl-mapel').innerText = userSession.mapel;
    if (userSession.foto) document.getElementById('user-pic').src = userSession.foto;

    const myKelas = userSession.ampu_kelas.split(',');
    let currentSubTab = 'presensi';

    function logout() {
        localStorage.removeItem('user_session');
        window.location.href = 'index.html';
    }

    function switchTab(sub) {
        currentSubTab = sub;
        document.querySelectorAll('.sub-tabs .btn-tab').forEach(b => {
            b.classList.remove('active');
            b.classList.add('inactive');
        });
        document.getElementById('tab-' + sub).classList.add('active');
        document.getElementById('tab-' + sub).classList.remove('inactive');
        renderRekap();
    }

    function renderRekap() {
        const area = document.getElementById('rekap-content-area');
        const optionsKelas = myKelas.map(k => `<option value="${k.trim()}">${k.trim()}</option>`).join('');

        if (currentSubTab === 'presensi') {
            area.innerHTML = `
                <div class="filter-card no-print">
                    <div class="form-grid">
                        <div style="flex:1;">
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="rekap-presensi-kelas" onchange="fetchRekapPresensi()">${optionsKelas}</select>
                        </div>
                        <div style="flex:1;">
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Tipe Rentang Rekap:</label>
                            <select id="rekap-presensi-tipe" onchange="toggleFilterRekapPresensi()">
                                <option value="bulanan">Bulanan</option>
                                <option value="mingguan">Mingguan</option>
                                <option value="harian">Harian</option>
                            </select>
                        </div>
                        <div id="box-filter-rekap-presensi" style="flex:1;"></div>
                    </div>
                </div>
                <div id="rekap-table-container">Memuat data rekap presensi...</div>`;
            toggleFilterRekapPresensi();
        } 
        else if (currentSubTab === 'jurnal') {
            area.innerHTML = `
                <div class="filter-card no-print">
                    <div class="form-grid">
                        <div style="flex:1;">
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="rekap-jurnal-kelas" onchange="fetchRekapJurnal()">${optionsKelas}</select>
                        </div>
                    </div>
                </div>
                <div id="rekap-table-container">Memuat data rekap jurnal...</div>`;
            fetchRekapJurnal();
        }
        else if (currentSubTab === 'nilai') {
            area.innerHTML = `
                <div class="filter-card no-print">
                    <div class="form-grid">
                        <div style="flex:1;">
                            <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                            <select id="rekap-nilai-kelas" onchange="fetchRekapNilai()">${optionsKelas}</select>
                        </div>
                    </div>
                </div>
                <div id="rekap-table-container">Memuat data rekap nilai...</div>`;
            fetchRekapNilai();
        }
    }

    /* FILTER DYNAMIC PRESENSI */
    function toggleFilterRekapPresensi() {
        const tipe = document.getElementById('rekap-presensi-tipe').value;
        const box = document.getElementById('box-filter-rekap-presensi');
        const now = new Date().toISOString().split('T')[0];
        
        if (tipe === 'harian') {
            box.innerHTML = `
                <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Tanggal:</label>
                <input type="date" id="rekap-presensi-val" value="${now}" onchange="fetchRekapPresensi()">`;
        } else if (tipe === 'mingguan') {
            box.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Awal Minggu:</label>
                        <input type="date" id="rekap-presensi-val1" value="${now}" onchange="fetchRekapPresensi()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Akhir Minggu:</label>
                        <input type="date" id="rekap-presensi-val2" value="${now}" onchange="fetchRekapPresensi()">
                    </div>
                </div>`;
        } else {
            box.innerHTML = `
                <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Bulan:</label>
                <input type="month" id="rekap-presensi-val" value="${now.slice(0,7)}" onchange="fetchRekapPresensi()">`;
        }
        fetchRekapPresensi();
    }

    /* 1. FETCH REKAP PRESENSI */
    async function fetchRekapPresensi() {
        const kls = document.getElementById('rekap-presensi-kelas').value;
        const tipe = document.getElementById('rekap-presensi-tipe').value;
        const container = document.getElementById('rekap-table-container');

        let val1 = "", val2 = "", labelInfo = "";
        const now = new Date().toISOString().split('T')[0];

        if (tipe === 'harian') {
            val1 = document.getElementById('rekap-presensi-val')?.value || now;
            labelInfo = `Harian: ${val1}`;
        } else if (tipe === 'mingguan') {
            val1 = document.getElementById('rekap-presensi-val1')?.value || now;
            val2 = document.getElementById('rekap-presensi-val2')?.value || now;
            labelInfo = `Mingguan: ${val1} s.d. ${val2}`;
        } else {
            val1 = document.getElementById('rekap-presensi-val')?.value || now.slice(0,7);
            labelInfo = `Bulanan: ${val1}`;
        }

        container.innerHTML = `<div style="text-align:center; padding:30px; color:#64748b;"><i class="fas fa-spinner fa-spin"></i> Memuat data rekap presensi...</div>`;

        try {
            const [resSiswa, resPres] = await Promise.all([
                fetch(`${API_URL}?action=getSiswa`).then(r => r.json()),
                fetch(`${API_URL}?action=getPresensi&kelas=${encodeURIComponent(kls)}&mapel=${encodeURIComponent(userSession.mapel)}&tipe=${tipe}&val1=${val1}&val2=${val2}`).then(r => r.json())
            ]);

            const siswaList = resSiswa.data ? resSiswa.data.filter(s => String(s.kelas).trim().toLowerCase() === String(kls).trim().toLowerCase()) : [];
            const presDataRaw = resPres.data || {};

            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" class="no-print">
                    <h3>REKAP PRESENSI - KELAS ${kls} (${labelInfo})</h3>
                    <button onclick="window.print()" style="background:#2c3e50; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fas fa-print"></i> Cetak PDF</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th width="40" class="txt-center">No</th>
                                <th>Nama Lengkap Siswa</th>
                                <th width="60" class="txt-center" style="color:#10b981;">H</th>
                                <th width="60" class="txt-center" style="color:#f59e0b;">S</th>
                                <th width="60" class="txt-center" style="color:#3b82f6;">I</th>
                                <th width="60" class="txt-center" style="color:#ef4444;">A</th>
                            </tr>
                        </thead>
                        <tbody>`;

            if (siswaList.length === 0) {
                html += `<tr><td colspan="6" class="txt-center" style="color:#94a3b8; padding:20px;">Tidak ada data siswa ditemukan untuk kelas ini.</td></tr>`;
            } else {
                siswaList.forEach((s, idx) => {
                    const namaClean = String(s.nama).trim();
                    const p = presDataRaw[namaClean] || { H: 0, S: 0, I: 0, A: 0 };
                    
                    let h = 0, sak = 0, iz = 0, alp = 0;
                    if (typeof p === 'object') {
                        h = p.H || 0; sak = p.S || 0; iz = p.I || 0; alp = p.A || 0;
                    } else if (typeof p === 'string') {
                        if (p === 'H') h = 1; if (p === 'S') sak = 1; if (p === 'I') iz = 1; if (p === 'A') alp = 1;
                    }

                    html += `
                        <tr>
                            <td class="txt-center">${idx + 1}</td>
                            <td class="txt-bold" style="color:#1e293b;">${namaClean}</td>
                            <td class="txt-center txt-bold" style="color:#10b981;">${h}</td>
                            <td class="txt-center txt-bold" style="color:#f59e0b;">${sak}</td>
                            <td class="txt-center txt-bold" style="color:#3b82f6;">${iz}</td>
                            <td class="txt-center txt-bold" style="color:#ef4444;">${alp}</td>
                        </tr>`;
                });
            }

            html += `</tbody></table></div>` + getSignatureHTML();
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = `<div style="color:#ef4444; padding:20px; text-align:center;">Gagal memuat rekap presensi.</div>`;
        }
    }

    /* 2. FETCH REKAP JURNAL */
    async function fetchRekapJurnal() {
        const kls = document.getElementById('rekap-jurnal-kelas').value;
        const container = document.getElementById('rekap-table-container');

        container.innerHTML = `<div style="text-align:center; padding:30px; color:#64748b;"><i class="fas fa-spinner fa-spin"></i> Memuat data rekap jurnal...</div>`;

        try {
            const res = await fetch(`${API_URL}?action=getJurnal`).then(r => r.json());
            const cleanTargetKelas = String(kls).replace(/^kelas\s*/i, '').replace(/[^a-z0-9]/gi, '').toLowerCase();

            const listJurnal = res.data ? res.data.filter(j => {
                const cleanJurnalKelas = String(j.kelas).replace(/^kelas\s*/i, '').replace(/[^a-z0-9]/gi, '').toLowerCase();
                return cleanJurnalKelas === cleanTargetKelas;
            }) : [];

            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" class="no-print">
                    <h3>REKAP JURNAL KBM - KELAS ${kls}</h3>
                    <button onclick="window.print()" style="background:#2c3e50; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fas fa-print"></i> Cetak PDF Jurnal</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th width="40" class="txt-center">No</th>
                                <th width="110" class="txt-center">Tanggal</th>
                                <th>Materi Pembahasan</th>
                                <th>Tugas / Catatan</th>
                            </tr>
                        </thead>
                        <tbody>`;

            if (listJurnal.length === 0) {
                html += `<tr><td colspan="4" class="txt-center" style="color:#94a3b8; padding:20px;">Belum ada catatan jurnal mengajar untuk kelas ini.</td></tr>`;
            } else {
                listJurnal.forEach((j, idx) => {
                    html += `
                        <tr>
                            <td class="txt-center">${idx + 1}</td>
                            <td class="txt-center">${String(j.tanggal).split("T")[0]}</td>
                            <td>${j.materi || '-'}</td>
                            <td>${j.tugas || '-'}</td>
                        </tr>`;
                });
            }

            html += `</tbody></table></div>` + getSignatureHTML();
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = `<div style="color:#ef4444; padding:20px; text-align:center;">Gagal memuat rekap jurnal.</div>`;
        }
    }

    /* 3. FETCH REKAP LEGER NILAI */
    async function fetchRekapNilai() {
        const kls = document.getElementById('rekap-nilai-kelas').value;
        const container = document.getElementById('rekap-table-container');

        container.innerHTML = `<div style="text-align:center; padding:30px; color:#64748b;"><i class="fas fa-spinner fa-spin"></i> Memuat leger nilai...</div>`;

        try {
            const [resSiswa, resNilai] = await Promise.all([
                fetch(`${API_URL}?action=getSiswa`).then(r => r.json()),
                fetch(`${API_URL}?action=getNilai&kelas=${encodeURIComponent(kls)}&mapel=${encodeURIComponent(userSession.mapel)}`).then(r => r.json())
            ]);

            const siswaList = resSiswa.data ? resSiswa.data.filter(s => String(s.kelas).trim().toLowerCase() === String(kls).trim().toLowerCase()) : [];
            const nilaiRekap = resNilai.data || {};

            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" class="no-print">
                    <h3>LEGER REKAPITULASI NILAI - KELAS ${kls}</h3>
                    <button onclick="window.print()" style="background:#2c3e50; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fas fa-print"></i> Cetak Leger PDF</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th width="40" class="txt-center">No</th>
                                <th>Nama Lengkap Siswa</th>
                                <th width="50" class="txt-center">NH1</th>
                                <th width="50" class="txt-center">NH2</th>
                                <th width="50" class="txt-center">NH3</th>
                                <th width="50" class="txt-center">NH4</th>
                                <th width="50" class="txt-center">T1</th>
                                <th width="50" class="txt-center">T2</th>
                                <th width="50" class="txt-center">STS1</th>
                                <th width="50" class="txt-center">SAS1</th>
                                <th width="70" class="txt-center" style="background:#e2e8f0;">Rata2</th>
                            </tr>
                        </thead>
                        <tbody>`;

            if (siswaList.length === 0) {
                html += `<tr><td colspan="11" class="txt-center" style="color:#94a3b8; padding:20px;">Tidak ada data siswa ditemukan untuk kelas ini.</td></tr>`;
            } else {
                siswaList.forEach((s, idx) => {
                    const namaClean = String(s.nama).trim();
                    const scores = nilaiRekap[namaClean] || {};
                    
                    const nh1 = Number(scores.nh1) || 0;
                    const nh2 = Number(scores.nh2) || 0;
                    const nh3 = Number(scores.nh3) || 0;
                    const nh4 = Number(scores.nh4) || 0;
                    const t1 = Number(scores.tugas1) || 0;
                    const t2 = Number(scores.tugas2) || 0;
                    const sts1 = Number(scores.sts1) || 0;
                    const sas1 = Number(scores.sas1) || 0;
                    
                    const listVal = [nh1, nh2, nh3, nh4, t1, t2, sts1, sas1].filter(v => v > 0);
                    const total = listVal.reduce((a, b) => a + b, 0);
                    const avg = listVal.length > 0 ? (total / listVal.length).toFixed(1) : "0.0";

                    html += `
                        <tr>
                            <td class="txt-center">${idx + 1}</td>
                            <td class="txt-bold" style="color:#1e293b;">${namaClean}</td>
                            <td class="txt-center">${nh1 || '-'}</td>
                            <td class="txt-center">${nh2 || '-'}</td>
                            <td class="txt-center">${nh3 || '-'}</td>
                            <td class="txt-center">${nh4 || '-'}</td>
                            <td class="txt-center">${t1 || '-'}</td>
                            <td class="txt-center">${t2 || '-'}</td>
                            <td class="txt-center">${sts1 || '-'}</td>
                            <td class="txt-center">${sas1 || '-'}</td>
                            <td class="txt-center txt-bold" style="background:#f8fafc; color:#1e293b;">${avg}</td>
                        </tr>`;
                });
            }

            html += `</tbody></table></div>` + getSignatureHTML();
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = `<div style="color:#ef4444; padding:20px; text-align:center;">Gagal memuat leger nilai.</div>`;
        }
    }

    function getSignatureHTML() {
        return `
            <div class="signature-container">
                <div class="sig-box">
                    <p>Mengetahui,</p>
                    <p><strong>Kepala Sekolah</strong></p>
                    <div class="sig-space"></div>
                    <p>_______________________</p>
                </div>
                <div class="sig-box">
                    <p>Guru Mata Pelajaran,</p>
                    <br>
                    <div class="sig-space"></div>
                    <p><strong>${userSession.nama}</strong></p>
                </div>
            </div>`;
    }

    // Load awal
