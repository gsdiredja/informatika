<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAdaptif - Presensi Siswa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-dark: #1e293b; --nav-blue: #2c3e50; --accent-blue: #3498db; --bg-light: #f1f5f9; --white: #ffffff; --secondary-dark: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; flex-direction: column; min-height: 100vh; color: #334155; }
        .main-wrapper { display: flex; flex: 1; flex-direction: column; }
        .top-header { background-color: var(--primary-dark); color: var(--white); text-align: center; padding: 15px 10px; z-index: 100; }
        .profile-pic { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); margin: 0 auto 5px; display: block; }
        .top-header h1 { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-bar { background-color: var(--nav-blue); display: flex; flex-wrap: wrap; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-bar a { flex: 1; text-align: center; color: #cbd5e1; padding: 12px 5px; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-bar a.active { border-bottom: 3px solid var(--accent-blue); background-color: rgba(255,255,255,0.05); color: #fff; }
        .btn-logout-top { width: 100%; background-color: #c0392b; text-align: center; color: var(--white); padding: 10px; text-decoration: none; font-size: 13px; font-weight: 600; display: block; border: none; cursor: pointer; }
        .content-area { flex: 1; padding: 15px; width: 100%; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .filter-card { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .form-grid { display: flex; flex-direction: column; gap: 12px; }
        select, input[type="date"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        
        .table-responsive { width: 100%; overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; background: var(--white); }
        table { width: 100%; border-collapse: collapse; }
        table th { background-color: #f8fafc; color: #64748b; font-weight: 700; text-align: left; padding: 12px; font-size: 13px; border-bottom: 2px solid #e2e8f0; }
        table td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        .txt-center { text-align: center; } .txt-bold { font-weight: bold; }

        .radio-group-horizontal { display: flex; justify-content: center; gap: 10px; align-items: center; }
        .radio-pill { display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #cbd5e1; background: #fff; cursor: pointer; font-weight: 700; font-size: 13px; transition: all 0.2s ease; user-select: none; }
        .radio-pill input[type="radio"] { display: none; }
        .radio-pill:has(input[value="H"]:checked) { background-color: #10b981; color: #fff; border-color: #10b981; }
        .radio-pill:has(input[value="S"]:checked) { background-color: #f59e0b; color: #fff; border-color: #f59e0b; }
        .radio-pill:has(input[value="I"]:checked) { background-color: #3b82f6; color: #fff; border-color: #3b82f6; }
        .radio-pill:has(input[value="A"]:checked) { background-color: #ef4444; color: #fff; border-color: #ef4444; }

        footer { background-color: var(--secondary-dark); color: #94a3b8; text-align: center; padding: 20px; font-size: 12px; margin-top: auto; }

        @media (min-width: 769px) {
            .main-wrapper { flex-direction: row; }
            .top-header { width: 260px; min-height: 100vh; position: sticky; top: 0; padding-top: 40px; }
            .profile-pic { width: 90px; height: 90px; margin-bottom: 15px; }
            .nav-bar { flex-direction: column; background: none; box-shadow: none; margin-top: 25px; }
            .nav-bar a { width: 100%; text-align: left; padding: 15px 25px; flex-direction: row; gap: 12px; font-size: 15px; }
            .nav-bar a.active { border-left: 4px solid var(--accent-blue); background-color: #34495e; border-bottom: none; }
            .btn-logout-top { position: absolute; bottom: 0; left: 0; padding: 15px; }
            .content-area { padding: 30px; max-width: calc(100% - 260px); }
            .form-grid { flex-direction: row; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-header">
        <img id="user-pic" src="photo-guru.png" class="profile-pic" alt="User">
        <h1>EduAdaptif</h1>
        <p id="user-name" style="font-size:12px; color:#cbd5e1; font-weight:600; margin-top:5px;">Loading...</p>
        <br/>
        <div class="nav-bar">
            <a href="beranda.html"><i class="fas fa-tachometer-alt"></i> Beranda</a>
            <a href="presensi.html" class="active"><i class="fas fa-clipboard-user"></i> Presensi Siswa</a>
            <a href="jurnal.html"><i class="fas fa-book-open"></i> Jurnal Mengajar</a>
            <a href="nilai.html"><i class="fas fa-graduation-cap"></i> Input Nilai</a>
            <a href="rekap.html"><i class="fas fa-file-invoice"></i> Rekapitulasi</a>
        </div>
        <button onclick="logout()" class="btn-logout-top"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    </div>

    <div class="content-area">
        <div class="card">
            <h2>Input Presensi Harian — <span id="lbl-mapel" style="color:var(--accent-blue);"></span></h2>
            <div class="filter-card">
                <div class="form-grid">
                    <div>
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Pilih Kelas:</label>
                        <select id="sel-kelas" onchange="loadDataPresensi()"></select>
                    </div>
                    <div>
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Tanggal Mengajar:</label>
                        <input type="date" id="sel-tgl" onchange="loadDataPresensi()">
                    </div>
                </div>
            </div>
            <div id="table-container">Memuat data siswa...</div>
        </div>
    </div>
</div>

<footer>&copy; 2026 <strong>EduAdaptif</strong> | Created by usudo.id</footer>

<script src="config.js"></script>
<script>
    const userSession = JSON.parse(localStorage.getItem('user_session'));
    if (!userSession) window.location.href = 'index.html';

    document.getElementById('user-name').innerText = userSession.nama;
    document.getElementById('lbl-mapel').innerText = userSession.mapel;
    if (userSession.foto) document.getElementById('user-pic').src = userSession.foto;

    const myKelas = userSession.ampu_kelas.split(',');
    const selKelas = document.getElementById('sel-kelas');
    
    // Opsi pilihan kelas murni sesuai isi ampu_kelas (XI-3, XI-4, dst.)
    selKelas.innerHTML = myKelas.map(k => `<option value="${k.trim()}">${k.trim()}</option>`).join('');
    
    document.getElementById('sel-tgl').value = new Date().toISOString().split('T')[0];

    function logout() {
        localStorage.removeItem('user_session');
        window.location.href = 'index.html';
    }

    async function loadDataPresensi() {
        const kls = selKelas.value;
        const tgl = document.getElementById('sel-tgl').value;
        const container = document.getElementById('table-container');

        container.innerHTML = `<div style="text-align:center; padding:30px; color:#64748b;"><i class="fas fa-spinner fa-spin"></i> Memuat presensi...</div>`;

        try {
            const [resSiswa, resPres] = await Promise.all([
                fetch(`${API_URL}?action=getSiswa`).then(r => r.json()),
                fetch(`${API_URL}?action=getPresensi&tanggal=${tgl}&kelas=${encodeURIComponent(kls)}&mapel=${encodeURIComponent(userSession.mapel)}`).then(r => r.json())
            ]);

            const siswaList = resSiswa.data ? resSiswa.data.filter(s => String(s.kelas).trim().toLowerCase() === String(kls).trim().toLowerCase()) : [];
            const presData = resPres.data || {};

            if (siswaList.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8;">Tidak ada data siswa untuk kelas ini.</div>`;
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th width="50" class="txt-center">No</th>
                                <th>Nama Lengkap Siswa</th>
                                <th width="320" class="txt-center">Status Kehadiran</th>
                            </tr>
                        </thead>
                        <tbody>`;

            siswaList.forEach((s, idx) => {
                const namaClean = String(s.nama).trim();
                const st = presData[namaClean] || 'H';

                html += `
                    <tr>
                        <td class="txt-center">${idx + 1}</td>
                        <td class="txt-bold" style="color:#1e293b;">${namaClean}</td>
                        <td class="txt-center">
                            <div class="radio-group-horizontal">
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="H" ${st==='H'?'checked':''} data-nama="${namaClean}"> Hadir</label>
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="S" ${st==='S'?'checked':''} data-nama="${namaClean}"> Sakit</label>
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="I" ${st==='I'?'checked':''} data-nama="${namaClean}"> Izin</label>
                                <label class="radio-pill"><input type="radio" name="p_${idx}" value="A" ${st==='A'?'checked':''} data-nama="${namaClean}"> Alpha</label>
                            </div>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table></div>
            <button id="btn-save" onclick="savePresensi()" style="background:var(--accent-blue); color:#fff; border:none; padding:13px; border-radius:8px; width:100%; margin-top:20px; font-weight:bold; cursor:pointer;">
                <i class="fas fa-save"></i> Simpan Data Presensi
            </button>`;

            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<div style="color:#ef4444; padding:20px; text-align:center;">Gagal terhubung ke server Google Sheets.</div>`;
        }
    }

    async function savePresensi() {
        const btn = document.getElementById('btn-save');
        const kls = selKelas.value;
        const tgl = document.getElementById('sel-tgl').value;
        const inputs = document.querySelectorAll('#table-container input[type="radio"]:checked');

        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Menyimpan...`;

        const list = [];
        inputs.forEach(inp => {
            list.push({ nama: inp.getAttribute('data-nama'), status: inp.value });
        });

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'savePresensi', tanggal: tgl, kelas: kls, mapel: userSession.mapel, presensi: list })
            });
            const data = await res.json();
            alert(data.message || 'Presensi berhasil disimpan!');
        } catch (e) {
            alert('Gagal menyimpan presensi.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-save"></i> Simpan Data Presensi`;
        }
    }

    // Load awal
    loadDataPresensi();
</script>
</body>
</html>
