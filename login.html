<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Kelas INFORMATIKA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Memuat database siswa -->
    <script src="datasiswa.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f3f4f6; color: #333333; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: white; border: 1px solid #e5e7eb; padding: 30px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .login-card h2 { margin-bottom: 20px; color: #0b3a7a; font-size: 20px; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #4b5563; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; outline: none; font-size: 14px; }
        .btn-login { width: 100%; background: #0b3a7a; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 10px; transition: background 0.2s; }
        .btn-login:hover { background: #072652; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login Kelas INFORMATIKA</h2>
        <div class="form-group">
            <label>Username / NISN</label>
            <input type="text" id="inputUser" placeholder="Masukkan username Anda...">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="inputPass" placeholder="Masukkan password Anda...">
        </div>
        <button class="btn-login" onclick="prosesLogin()">Masuk Aplikasi</button>
    </div>

    <script>
        // Bersihkan session lama saat masuk ke halaman login
        localStorage.removeItem('loggedSiswa');

        function prosesLogin() {
            const userIn = document.getElementById('inputUser').value.trim();
            const passIn = document.getElementById('inputPass').value.trim();

            if(!userIn || !passIn) {
                alert("Username dan Password wajib diisi!");
                return;
            }

            // Validasi data ke datasiswa.js
            const ketemu = daftarSiswa.find(s => s.username === userIn && s.password === passIn);

            if(ketemu) {
                // Simpan data siswa ke LocalStorage sebagai tiket masuk ke index.html
                localStorage.setItem('loggedSiswa', JSON.stringify(ketemu));
                // Pindah ke halaman modul utama
                window.location.href = "topik.html";
            } else {
                alert("Username atau Password salah! Silakan coba lagi.");
            }
        }
    </script>
</body>
</html>
