<script>
        // Status Progress Akses: Menentukan apakah materi BISA DIKLIK atau tidak
        let aksesMateri = {
            1: true,   // Materi 1 bisa diklik sejak awal
            2: false,  // Materi 2 terkunci sampai Materi 1 diklik
            3: false   // Materi 3 terkunci sampai Materi 2 diklik
        };

        const cardModul = document.getElementById('openModuleBtn');
        const modalPenuh = document.getElementById('moduleModal');
        const tombolTutup = document.getElementById('closeModuleBtn');
        const dynamicContent = document.getElementById('dynamicContent');

        // Buka modal utama
        cardModul.addEventListener('click', () => {
            modalPenuh.classList.add('active');
            document.body.style.overflow = 'hidden';
            switchMateri(1); // Otomatis muat materi 1 saat pertama buka
        });

        // Tutup modal utama
        tombolTutup.addEventListener('click', (e) => {
            e.stopPropagation();
            modalPenuh.classList.remove('active');
            document.body.style.overflow = 'auto';
        });

        // Fungsi ketika Judul Materi diklik
        function switchMateri(nomorMateri) {
            // 1. Cek apakah materi yang diklik sudah diperbolehkan untuk diakses
            if (!aksesMateri[nomorMateri]) {
                alert("Selesaikan materi sebelumnya terlebih dahulu!");
                return;
            }

            // 2. Ubah Judul di sisi kanan
            const daftarJudul = {
                1: "Materi 1: Pengenalan Konsep SPAB",
                2: "Materi 2: Manajemen Risiko",
                3: "Materi 3: Aksi Nyata"
            };
            document.getElementById('judulMateriTerpilih').innerText = daftarJudul[nomorMateri];

            // 3. Ubah gaya aktif (highlight biru) di menu kiri
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`menu-${nomorMateri}`).classList.add('active');

            // 4. UBAH TULISAN MENJADI "✓ Opened" HANYA PADA MATERI YANG SEDANG DIKLIK
            const badgeSekarang = document.getElementById(`badge-${nomorMateri}`);
            badgeSekarang.className = "check-icon";
            badgeSekarang.innerText = "✓ Opened";

            // 5. Tampilkan animasi loading singkat
            dynamicContent.innerHTML = `<div class="loading-spinner">Memuat konten materi ${nomorMateri}...</div>`;

            // 6. Ambil file HTML materi secara dinamis
            fetch(`materi-${nomorMateri}.html`)
                .then(response => {
                    if (!response.ok) throw new Error("File tidak ditemukan");
                    return response.text();
                })
                .then(data => {
                    dynamicContent.innerHTML = data;
                    
                    // 7. AKTIFKAN MATERI BERIKUTNYA (Buka Gemboknya saja, jangan beri tulisan Opened dulu)
                    let materiBerikutnya = nomorMateri + 1;
                    if (materiBerikutnya <= 3 && !aksesMateri[materiBerikutnya]) {
                        aksesMateri[materiBerikutnya] = true; // Beri izin akses klik

                        const menuTarget = document.getElementById(`menu-${materiBerikutnya}`);
                        menuTarget.classList.remove('locked'); // Lepas efek redup/kunci di CSS

                        // Ubah tulisan gembok menjadi informasi bahwa materi sudah siap diakses
                        const badgeTarget = document.getElementById(`badge-${materiBerikutnya}`);
                        badgeTarget.className = ""; // Reset warna gembok
                        badgeTarget.style.color = "#3b82f6"; // Beri warna biru penanda siap
                        badgeTarget.style.fontWeight = "500";
                        badgeTarget.innerText = "🔓 Siap Dibuka";
                    }
                })
                .catch(error => {
                    dynamicContent.innerHTML = `<p style="color:red; text-align:center;">Gagal memuat materi. Pastikan proyek dijalankan menggunakan Live Server / sudah di-deploy ke GitHub Pages.</p>`;
                });
        }
    </script>
